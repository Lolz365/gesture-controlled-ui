<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breath Room · gesture-controlled-ui</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/experiment.css" />
</head>
<body>
  <nav><a href="../index.html">Home</a></nav>
  <div class="exp-header">
    <h1>🌬️ Breath Room</h1>
    <p>Open palm → scatter particles. Closed fist → collapse into sphere.</p>
  </div>

  <div id="stage">
    <video id="webcam" playsinline muted></video>
    <canvas id="canvas" class="layer"></canvas>
  </div>

  <div id="status-bar">
    <div class="status-dot loading" id="dot"></div>
    <span id="status">Loading MediaPipe…</span>
  </div>

  <div class="hints">
    <span class="hint">🤚 Open palm → explode</span>
    <span class="hint">✊ Closed fist → sphere</span>
  </div>

  <script type="module">
    import { startWebcam } from '../assets/js/webcam.js';
    import { initHandTracker, detectHands, palmCenter, handOpenness } from '../assets/js/hand-tracker.js';

    const video  = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const dot    = document.getElementById('dot');
    const status = document.getElementById('status');
    const stage  = document.getElementById('stage');
    const W = stage.offsetWidth || 640, H = stage.offsetHeight || 480;
    canvas.width = W; canvas.height = H;
    video.width = W; video.height = H;
    const ctx = canvas.getContext('2d');
    const COUNT = 180, CX = W/2, CY = H/2;

    const particles = Array.from({length:COUNT},(_,i)=>{
      const a=(i/COUNT)*Math.PI*2, rad=10+Math.random()*20;
      return { x:CX+Math.cos(a)*rad, y:CY+Math.sin(a)*rad, vx:0, vy:0,
               r:1.8+Math.random()*2.5, alpha:0.5+Math.random()*0.45,
               hx:CX+Math.cos(a)*(30+Math.random()*50), hy:CY+Math.sin(a)*(30+Math.random()*50) };
    });

    let palmX=CX, palmY=CY, openness=0.5;
    function setStatus(msg,state){status.textContent=msg;dot.className='status-dot '+state;}

    function runParticles() {
      ctx.fillStyle='rgba(8,8,16,0.18)'; ctx.fillRect(0,0,W,H);
      particles.forEach(p=>{
        if(openness>0.55){
          const dx=p.x-palmX,dy=p.y-palmY,dist=Math.sqrt(dx*dx+dy*dy)||1,force=(openness-0.55)*3.5;
          p.vx+=(dx/dist)*force; p.vy+=(dy/dist)*force;
        } else {
          const force=(0.55-openness)*4.5;
          p.vx+=(p.hx-p.x)*0.015*force; p.vy+=(p.hy-p.y)*0.015*force;
        }
        p.vx*=0.93; p.vy*=0.93; p.x+=p.vx; p.y+=p.vy;
        if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
        const hue=openness>0.55?'200,90%,65%':'270,80%,65%';
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`hsla(${hue},${p.alpha})`; ctx.fill();
      });
    }

    async function main() {
      setStatus('Requesting webcam…','loading');
      await startWebcam(video);
      setStatus('Loading hand model…','loading');
      await initHandTracker();
      setStatus('Ready — show your hand!','ready');
      function loop(){
        const lm=detectHands(video);
        const palm=palmCenter(lm,W,H);
        if(palm){ palmX=W-palm.x; palmY=palm.y; const o=handOpenness(lm,W,H); if(o!==null) openness=openness*0.85+o*0.15; }
        runParticles();
        requestAnimationFrame(loop);
      }
      loop();
    }

    main().catch(err=>{
      setStatus('⚠️ '+err.message+' — click to toggle','error');
      let tog=false;
      canvas.addEventListener('click',()=>{ tog=!tog; openness=tog?1:0; });
      canvas.addEventListener('pointermove',e=>{ const r=canvas.getBoundingClientRect(); palmX=e.clientX-r.left; palmY=e.clientY-r.top; });
      (function loop(){ runParticles(); requestAnimationFrame(loop); })();
    });
  </script>
</body>
</html>
