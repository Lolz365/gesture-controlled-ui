<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breath Room · gesture-controlled-ui</title>
  <link rel="stylesheet" href="../assets/css/experiment.css" />
</head>
<body>
  <nav><a href="../index.html">← Back</a></nav>
  <h1>🌬️ Breath Room</h1>
  <p class="subtitle">Move your hand slowly — particles respond to your pace.</p>

  <div id="stage" style="height:480px">
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>
  <p id="status">Move your cursor gently…</p>

  <script type="module">
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');

    const W = canvas.width, H = canvas.height;
    const PARTICLE_COUNT = 120;
    let mouseX = W/2, mouseY = H/2, speed = 0;

    const particles = Array.from({ length: PARTICLE_COUNT }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      r: 2 + Math.random() * 3,
      alpha: 0.4 + Math.random() * 0.5
    }));

    canvas.addEventListener('pointermove', e => {
      const rect = canvas.getBoundingClientRect();
      const nx = e.clientX - rect.left;
      const ny = e.clientY - rect.top;
      const dx = nx - mouseX, dy = ny - mouseY;
      speed = Math.sqrt(dx*dx + dy*dy);
      mouseX = nx; mouseY = ny;
    });

    function draw() {
      ctx.fillStyle = 'rgba(13,13,13,0.15)';
      ctx.fillRect(0, 0, W, H);

      const influence = Math.min(speed * 0.05, 2);

      particles.forEach(p => {
        const dx = mouseX - p.x, dy = mouseY - p.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        p.vx += (dx / dist) * influence * 0.02;
        p.vy += (dy / dist) * influence * 0.02;
        p.vx *= 0.97; p.vy *= 0.97;
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(124,111,247,${p.alpha})`;
        ctx.fill();
      });

      speed *= 0.9;
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
